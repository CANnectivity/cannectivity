common:
  tags:
    - usb
    - can
  build_only: true
  platform_allow:
    - native_sim
    - native_sim/native/64
tests:
  usb.gs_usb.cxx98:
    extra_configs:
      - CONFIG_STD_CPP98=y
  usb.gs_usb.cxx11:
    extra_configs:
      - CONFIG_STD_CPP11=y
  usb.gs_usb.cxx14:
    extra_configs:
      - CONFIG_STD_CPP14=y
  usb.gs_usb.cxx17:
    extra_configs:
      - CONFIG_STD_CPP17=y
  usb.gs_usb.cxx20:
    extra_configs:
      - CONFIG_STD_CPP20=y
  usb.gs_usb.cxx23:
    extra_configs:
      - CONFIG_STD_CPP23=y
